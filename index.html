<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MEPSB Project Progress</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>

  <!-- LOGIN VIEW -->

  <main>
    <section id="loginView" class="card login-card">
      <h2>Login</h2>

```
  <form id="loginForm">
    <label>Username
      <input id="username" name="username" required />
    </label>

    <label>Password
      <input id="password" name="password" type="password" required />
    </label>

    <button type="submit">Login</button>

    <p id="errorMsg" class="error"></p>
  </form>
</section>

<!-- DASHBOARD (HIDDEN FIRST) -->
<section id="appView" class="hidden">
  <header class="topbar">
    <div>
      <h1>A. Project Dashboard</h1>
      <p class="muted">Project tracking system</p>
    </div>

    <div class="userbox">
      <span id="currentUser"></span>
      <button id="logoutBtn">Logout</button>
    </div>
  </header>

  <section class="stats">
    <div class="stat"><strong id="totalCount">0</strong><span>Total</span></div>
    <div class="stat"><strong id="ongoingCount">0</strong><span>Ongoing</span></div>
    <div class="stat"><strong id="completedCount">0</strong><span>Completed</span></div>
    <div class="stat"><strong id="attachmentCount">0</strong><span>Files</span></div>
  </section>

  <section class="toolbar card">
    <input id="searchInput" placeholder="Search..." />
    <button id="addProjectBtn">+ Add Project</button>
  </section>

  <section class="card table-card">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Project</th>
          <th>Status</th>
          <th>Remarks</th>
          <th>Save</th>
        </tr>
      </thead>
      <tbody id="projectRows"></tbody>
    </table>
  </section>
</section>
```

  </main>

  <script src="/app.js"></script>

</body>
</html>

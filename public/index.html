<!DOCTYPE html>
<html>
<head>
  <title>MEPSB</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login">
  <div class="login-box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="app" style="display:none;">

  <div class="menu-dropdown">
    <button onclick="toggleMenu()">☰ Menu ▼</button>

    <div id="menuBox" class="menu-box">
      <div onclick="goDashboard()">Dashboard</div>
      <div onclick="goTimeline()">Timeline</div>
    </div>
  </div>

  <div id="dashboardPage">
    <h2>Project Dashboard</h2>

    <div class="top-buttons">
      <button onclick="zoomIn()">Zoom +</button>
      <button onclick="zoomOut()">Zoom -</button>
      <button onclick="logout()">Logout</button>
      <button onclick="exportExcel()">Export</button>
    </div>

    <div class="search-box">
      <input id="searchId" type="number" placeholder="ID">
      <button onclick="searchById()">Search</button>
      <button onclick="clearSearch()">Clear</button>
    </div>

    <div class="add-box">
      <input id="desc" placeholder="Project">
      <input id="status" placeholder="Status">
      <input id="remarks" placeholder="Remarks">
      <button onclick="addProject()">Add</button>
    </div>

    <div class="table-wrapper">
      <table border="1">
        <thead>
          <tr>
            <th>ID</th>
            <th>Project</th>
            <th>Status</th>
            <th>Tendering</th>
            <th>BG</th>
            <th>CWR/PO</th>
            <th>Workscope</th>
            <th>SI Report</th>
            <th>Cost</th>
            <th>CCC</th>
            <th>Procurement</th>
            <th>Delivery</th>
            <th>FCB</th>
            <th>Mob</th>
            <th>Handover</th>
            <th>Demob</th>
            <th>Close Out</th>
            <th>Remarks</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

  <div id="timelinePage" style="display:none;">
      <h2>Timeline</h2>

    <div class="timeline-tools">
   <label>Year:</label>
   <select id="timelineYear" onchange="loadTimeline()">
    <option value="2026">2026</option>
    <option value="2027">2027</option>
    <option value="2028">2028</option>
    <option value="2029">2029</option>
    <option value="2030">2030</option>
    <option value="2031">2031</option>
    <option value="2032">2032</option>
    <option value="2033">2033</option>
    <option value="2034">2034</option>
    <option value="2035">2035</option>
    <option value="2036">2036</option>
   </select>

  <button onclick="addTimelineRow()">Add Timeline</button>
  <button onclick="exportTimelineExcel()">Export Timeline</button>
</div>

    <div class="table-wrapper">
      <table border="1">
        <thead>
          <tr>
            <th>Jan</th>
            <th>Feb</th>
            <th>Mar</th>
            <th>Apr</th>
            <th>May</th>
            <th>Jun</th>
            <th>Jul</th>
            <th>Aug</th>
            <th>Sep</th>
            <th>Oct</th>
            <th>Nov</th>
            <th>Dec</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="timelineTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
